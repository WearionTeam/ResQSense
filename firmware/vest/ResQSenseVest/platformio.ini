; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3usbotg]
platform = espressif32
board = esp32s3usbotg
framework = arduino
build_flags = -I ../../../shared
monitor_speed = 115200
lib_deps = 
	jgromes/RadioLib @ ^7.6.0
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit TMP117 @ ^1.0.2
	adafruit/Adafruit BusIO @ ^1.16.1
	https://github.com/DFRobot/DFRobot_BloodOxygen_S.git
	https://github.com/DFRobot/DFRobot_GNSSAndRTC.git
	https://github.com/DFRobot/DFRobot_GNSS.git
	https://github.com/DFRobot/DFRobot_RTU.git

[env:esp32wroom]
board = upesy_wroom
platform = espressif32
framework = arduino
build_flags = 
	-I ../../../shared
	-D U_WROOM
monitor_speed = 115200
lib_deps = 
	jgromes/RadioLib @ ^7.6.0
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit TMP117 @ ^1.0.2
	adafruit/Adafruit BusIO @ ^1.16.1
	https://github.com/DFRobot/DFRobot_BloodOxygen_S.git
	https://github.com/DFRobot/DFRobot_GNSSAndRTC.git
	https://github.com/DFRobot/DFRobot_RTU.git

